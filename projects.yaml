configuration:
  markdown_header_file: "config/header.md"
  markdown_footer_file: "config/footer.md"
  min_projectrank: 0
  min_stars: 0
  require_license: false
  require_repo: false
  projects_per_category: 9999  # Show all projects per category (no "Show N hidden projects..." collapse)

categories:
  - category: "launchers"
    title: "Launchers"
    subtitle: "Small bootstrap binaries that download Python and dependencies on first run (typically via uv). Tiny artifact, but requires internet access the first time it runs."
  - category: "freezers"
    title: "Freezers"
    subtitle: "Bundle the Python interpreter and dependencies into a self-contained package. Fully offline, larger artifact, no Python required on the target."
  - category: "compilers"
    title: "Compilers"
    subtitle: "Compile Python to C or machine code for performance and obfuscation. Fully standalone, slowest to build."
  - category: "zipapps"
    title: "Zipapps"
    subtitle: "Package the application as an executable zip archive. Requires Python to already be installed on the target — best for internal/dev distribution."
  - category: "miscellaneous"
    title: "Miscellaneous"
    subtitle: "If you can think of a more appropriate category for the items below, PRs welcome!"

labels:
  - label: "written-in-c"
    description: "Written in C"
    image: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/c/c-original.svg"
  - label: "written-in-python"
    description: "Written in Python"
    image: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/python/python-original.svg"
  - label: "written-in-rust"
    description: "Written in Rust"
    image: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/rust/rust-original.svg"
  - label: "written-in-cpp"
    description: "Written in C++"
    image: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/cplusplus/cplusplus-original.svg"
  - label: "written-in-go"
    description: "Written in Go"
    image: "https://cdn.jsdelivr.net/gh/devicons/devicon/icons/go/go-original-wordmark.svg"

projects:
  - name: pyinstaller
    github_id: pyinstaller/pyinstaller
    labels: ["written-in-c"]
    category: "freezers"
  - name: briefcase
    github_id: beeware/briefcase
    labels: ["written-in-python"]
    category: "freezers"
  - name: pyapp
    github_id: ofek/pyapp
    labels: ["written-in-rust"]
    category: "launchers"
  - name: PyOxidizer
    github_id: indygreg/PyOxidizer
    labels: ["written-in-rust"]
    category: "freezers"
  - name: py2exe
    github_id: py2exe/py2exe
    labels: ["written-in-c", "written-in-python"]
    category: "freezers"
  - name: shiv
    github_id: linkedin/shiv
    labels: ["written-in-python"]
    category: "zipapps"
  - name: pex
    github_id: pex-tool/pex
    labels: ["written-in-python"]
    category: "zipapps"
  - name: "zipapp — Manage executable Python zip archives"
    homepage: "https://docs.python.org/3/library/zipapp.html"
    resource: True
  - name: PyStand
    github_id: skywind3000/PyStand
    labels: ["written-in-cpp"]
    category: "freezers"
  - name: "Why it's so hard to redistribute standalone Python apps"
    homepage: "https://www.youtube.com/watch?v=3BfGAYfKZIg"
    resource: True
  - name: nuitka
    github_id: Nuitka/Nuitka
    labels: ["written-in-c", "written-in-python"]
    category: "compilers"
  - name: cx_Freeze
    github_id: marcelotduarte/cx_Freeze
    labels: ["written-in-python"]
    category: "freezers"
  - name: "How to use the Python embeddable redistribution to make standalone apps"
    homepage: "https://www.youtube.com/watch?v=xiwdz2LAtGc"
    resource: True
  - name: packaged
    github_id: tusharsadhwani/packaged
    labels: ["written-in-python"]
    category: "freezers"
  - name: PyCrucible
    github_id: razorblade23/PyCrucible
    labels: ["written-in-rust"]
    category: "launchers"
  - name: uvbox
    github_id: AmadeusITGroup/uvbox
    labels: ["written-in-go"]
    category: "launchers"
  - name: "How do I ship a Python application to end users?"
    homepage: "https://pydevtools.com/handbook/explanation/how-do-i-ship-a-python-application-to-end-users/"
    resource: True
  - name: PyTauri
    github_id: pytauri/pytauri
    pypi_id: pytauri
    labels: ["written-in-rust"]
    category: "freezers"
