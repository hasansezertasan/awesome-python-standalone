configuration:
  markdown_header_file: "config/header.md"
  markdown_footer_file: "config/footer.md"
  min_projectrank: 0
  min_stars: 0
  require_license: false
  require_repo: false

categories:
  - category: "miscellaneous"
    title: "Miscellaneous"
    subtitle: "If you can think of a more appropriate category for the items below, PRs welcome!"

labels:
  - label: "written-in-c"
    description: "Written in C"
    image: "https://images.icon-icons.com/2415/PNG/512/c_original_logo_icon_146611.png"
  - label: "written-in-python"
    description: "Written in Python"
    image: "https://www.python.org/static/favicon.ico"
  - label: "written-in-rust"
    description: "Written in Rust"
    image: "https://images.icon-icons.com/2699/PNG/512/rust_lang_logo_icon_169776.png"
  - label: "written-in-cpp"
    description: "Written in C++"
    image: "https://isocpp.org/assets/images/cpp_logo.png"
  - label: "written-in-go"
    description: "Written in Go"
    image: "https://go.dev/blog/go-brand/Go-Logo/PNG/Go-Logo_Blue.png"

